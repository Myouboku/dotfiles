$terminal = ghostty
$fileManager = thunar
# $menu = rofi
$browser = brave
$ipc = qs -c noctalia-shell ipc call

$focus_or_launch = ~/scripts/focus_or_launch.sh

bind = SUPER, Q, killactive,
bind = SUPER SHIFT, Delete, exit,
bind = SUPER SHIFT, F, togglefloating,
bind = SUPER, J, layoutmsg, togglesplit
bind = SUPER, R, layoutmsg, movetoroot
bind = SUPER, F, fullscreen,
bind = SUPER SHIFT, P, pin,

# bind = SUPER, Space, exec, $menu -show drun -show-icons
bind = SUPER, Space, exec, $ipc launcher toggle
bind = SUPER, C, exec, $ipc controlCenter toggle
bind = SUPER, comma, exec, $ipc settings toggle
bind = SUPER, L, exec, $ipc lockScreen lock
bind = SUPER, V, exec, $ipc launcher clipboard
bind = SUPER, semicolon, exec, $ipc launcher emoji
bind = SUPER, W, exec, $ipc launcher windows
bind = SUPER SHIFT, W, exec, $ipc wallpaper toggle
bind = SUPER, Escape, exec, $ipc systemMonitor toggle
bind = SUPER, N, exec, $ipc notifications toggleHistory
bind = SUPER SHIFT, N, exec, $ipc notifications toggleDND

# bind = SUPER, V, exec, cliphist list | $menu -dmenu -display-columns 2 | cliphist decode | wl-copy
# bind = SUPER, semicolon, exec, $menu -modi emoji -show emoji -emoji-mode copy

bind = SUPER, Return, exec, $terminal
bind = SUPER, E, exec, $fileManager
# bind = SUPER, L, exec, hyprlock
bind = SUPER, B, exec, $browser
# bind = SUPER, Escape, exec, $terminal -e btop
# bind = SUPER, W, exec, pkill waypaper || waypaper
bind = SUPER, A, exec, pkill pavucontrol-qt || pavucontrol-qt --tab 3
bind = SUPER SHIFT, V, exec, $focus_or_launch protonvpn-app protonvpn-app
bind = SUPER, O, exec, $focus_or_launch obsidian obsidian
bind = SUPER, S, exec, $focus_or_launch spotify spotify
bind = SUPER, P, exec, $focus_or_launch "Proton Pass" proton-pass
bind = SUPER, D, exec, wayscriber --active --freeze

bind = , Print, exec, grimblast -f copysave area ~/Images/Screenshots/"$(date)".png
bind = SUPER, Print, exec, grimblast copysave screen ~/Images/Screenshots/"$(date)".png
bind = CTRL, Print, exec, grimblast copysave active ~/Images/Screenshots/"$(date)".png

bind = SUPER, T, exec, ~/scripts/toggle-theme.sh

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

bind = SUPER, ampersand, workspace, 1
bind = SUPER, eacute, workspace, 2
bind = SUPER, quotedbl, workspace, 3
bind = SUPER, apostrophe, workspace, 4
bind = SUPER, parenleft, workspace, 5
bind = SUPER, minus, workspace, 6
bind = SUPER, egrave, workspace, 7
bind = SUPER, underscore, workspace, 8
bind = SUPER, ccedilla, workspace, 9
bind = SUPER, agrave, workspace, 10

bind = SUPER SHIFT, ampersand, movetoworkspace, 1
bind = SUPER SHIFT, eacute, movetoworkspace, 2
bind = SUPER SHIFT, quotedbl, movetoworkspace, 3
bind = SUPER SHIFT, apostrophe, movetoworkspace, 4
bind = SUPER SHIFT, parenleft, movetoworkspace, 5
bind = SUPER SHIFT, minus, movetoworkspace, 6
bind = SUPER SHIFT, egrave, movetoworkspace, 7
bind = SUPER SHIFT, underscore, movetoworkspace, 8
bind = SUPER SHIFT, ccedilla, movetoworkspace, 9
bind = SUPER SHIFT, agrave, movetoworkspace, 10

bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
