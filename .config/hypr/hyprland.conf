# Monitors config
monitor=DP-2,2560x1440@170,0x0,1,vrr,1
monitor=,preferred,auto,1

# Sources
source = ./startup.conf
source = ./windowRules.conf
source = ./binds.conf

# Default env vars
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# Keyboard, mouse, etc.
input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    # -1.0 - 1.0, 0 means no modification.
    sensitivity = 0
    accel_profile = flat
}

general {
    gaps_in = 8
    gaps_out = 0, 16, 16, 16
    border_size = 3
    col.active_border = rgb(f38ba8) rgb(fab387) rgb(f9e2af) rgb(a6e3a1) rgb(74c7ec) rgb(cba6f7) 45deg
    col.inactive_border = rgba(6c7086ee)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 4
        passes = 2
    }
    drop_shadow = true
    shadow_range = 16
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = yes

    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    bezier = easeOutCubic, 0.33, 1, 0.68, 1

    animation = windowsIn, 1, 3, easeOutBack, slide
    animation = windowsOut, 1, 3, easeOutBack, slide
    animation = windowsMove, 1, 3, easeOutBack, slide
    animation = workspaces, 1, 4, easeOutBack
    animation = layers, 1, 4, easeOutBack, popin 15%
    animation = fade, 1, 2, easeOutBack
    animation = border, 1, 6, easeOutCubic
    animation = borderangle, 1, 60, easeOutBack, loop
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_is_master = true
}

gestures {
    workspace_swipe = off
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}
